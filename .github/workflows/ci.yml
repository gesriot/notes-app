name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Release build
        run: cargo build --release -p notes-tui
